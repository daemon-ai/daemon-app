# `typos` allowlist (the pre-commit spell gate). These are false positives on intentional/valid
# spellings that surface when their files are staged; none are actual typos.
#
# Kept in sync with the superproject `../.typos.toml` (same pattern as daemon-node's typos.toml):
# `typos` applies the *nearest* config to each file, so a standalone daemon-app checkout is
# governed by this file (not the superproject's). The superproject's submodule-bump gate
# spell-checks the whole daemon-app tree, so this must cover the same terms.

[files]
extend-exclude = [
  # Vendored third-party / generated code and build output - not ours to spell-check.
  # `**/`-prefixed so they also match when the superproject's submodule-bump gate walks this
  # tree as `daemon-app/src/...` (typos matches nested-config globs relative to its CWD).
  "**/src/core/daemon/codec/generated/**",
  "**/src/core/daemon/codec/vendor/**",
  "**/src/tools/updater/vendor/**",
  "**/src/core/update/vendor/**",
  "**/build*/**",
  "**/result-*/**",
  "*.lock",
  # Shipped translation catalogs: the <translation> text is non-English by design
  # and would otherwise trip the spell gate. The English <source> lives in the
  # qsTr()/tr() literals, which are spell-checked as normal source.
  "**/i18n/daemon-app_*.ts",
]

# Committed binary icon rasters (generated by packaging/linux/icons/regen.sh).
# Declared as unchecked file types rather than extend-exclude: the pre-commit
# hook passes staged paths explicitly, and explicit arguments bypass excludes
# (typos only honors them with --force-exclude) but still honor type policy.
[type.png]
extend-glob = ["*.png"]
check-file = false

[type.ico]
extend-glob = ["*.ico"]
check-file = false

[type.icns]
extend-glob = ["*.icns"]
check-file = false

# Shipped translation catalogs (Qt Linguist `.ts`). The pre-commit hook passes staged
# paths explicitly, which bypasses `extend-exclude` (typos only honors it with
# --force-exclude) — so, like the icon rasters above, we exclude them via type policy
# instead. A custom type with a filename glob overrides typos' built-in `ts` type and
# matches by basename, covering both the local hook and the superproject tree-walk. The
# <translation> text is non-English by design; the English <source> is spell-checked via
# the qsTr()/tr() literals in the C++/QML sources.
[type.qttranslation]
extend-glob = ["daemon-app_*.ts"]
check-file = false

# Domain terms / library names / valid spelling variants / short identifier fragments that typos
# misreads as errors (each verified a false positive in this codebase).
[default.extend-words]
invokable = "invokable"     # Qt's Q_INVOKABLE macro
cose = "cose"               # COSE: CBOR Object Signing and Encryption
tpe = "tpe"                 # common `type` placeholder identifier
unparseable = "unparseable" # accepted variant of "unparsable"
clonable = "clonable"       # accepted variant of "cloneable"
togglable = "togglable"     # accepted variant of "toggleable"
lod = "lod"                 # LOD: level-of-detail (e.g. m_lodTier)
muc = "muc"                 # MUC: XMPP multi-user chat
secur = "secur"             # Secur32.dll: the Windows SSPI system library
cpy = "cpy"                 # NSIS StrCpy instruction (per-user NSIS template patch)
arange = "arange"           # numpy np.arange in skill examples
canva = "canva"             # Canva (product name)
# Upstream spellings in vendored Monocypher comments (the pre-commit hook passes
# staged paths explicitly, which bypasses the vendor extend-exclude above).
publically = "publically"
cannonical = "cannonical"
# Short fragments typos extracts from larger identifiers/words/fixtures (PNGs, MorAlekss, ...).
nd = "nd"
ot = "ot"
pn = "pn"
ba = "ba"
thm = "thm"
thi = "thi"
dout = "dout"
mis = "mis"
assum = "assum"
slee = "slee"
selec = "selec"
hel = "hel"
mor = "mor"
alikes = "alikes"

[default.extend-identifiers]
ratatui = "ratatui"         # the Rust TUI crate
Ratatui = "Ratatui"
