version = 1

# First-party C++/QML sources carry their own SPDX headers (SPDX-License-Identifier
# MPL-2.0 + SPDX-FileCopyrightText). This file declares licensing for:
#   * build/config/asset/doc files that cannot carry a comment header,
#   * the generated codec (drift-checked byte-for-byte, so it must NOT carry a
#     hand-added header),
#   * vendored third-party trees whose upstream headers lack a copyright line,
#   * bundled third-party fonts.
# The vendored zcbor runtime (src/core/daemon/codec/vendor/) already carries
# upstream Apache-2.0 + copyright headers and needs no annotation here.

# --- First-party non-source (build, config, i18n, docs, repo meta) ---
[[annotations]]
path = [
    "**/CMakeLists.txt",
    "**/*.cmake",
    "**/*.md",
    "**/*.qrc",
    "**/*.ts",
    "**/*.json",
    "**/*.py",
    "**/*.colorscheme",
    "**/.gitkeep",
    ".clang-format",
    ".clang-format-ignore",
    ".clang-tidy",
    ".editorconfig",
    ".gitignore",
    ".qmllint.ini",
    "flake.nix",
    "flake.lock",
    "LICENSE",
    "README.md",
    "AGENTS.md",
    "THIRD-PARTY-NOTICES.md",
]
SPDX-FileCopyrightText = "2026 Jarrad Hope"
SPDX-License-Identifier = "MPL-2.0"

# --- Generated codec: zcbor output from the first-party daemon-api CDDL contract.
#     Drift-checked against `nix run .#update-codec`, so headers are declared here
#     rather than written into the files. ---
[[annotations]]
path = ["src/core/daemon/codec/generated/**"]
SPDX-FileCopyrightText = "2026 Jarrad Hope"
SPDX-License-Identifier = "Apache-2.0"

# --- Vendored Tui Widgets private headers (BSL-1.0; upstream files carry an SPDX
#     id but no copyright line). ---
[[annotations]]
path = ["src/tui/vendor/Tui/**"]
SPDX-FileCopyrightText = "2020 Martin Hostettler"
SPDX-License-Identifier = "BSL-1.0"

# --- Bundled third-party fonts (shipped as Qt resources). NOT first-party;
#     see THIRD-PARTY-NOTICES.md. ---
[[annotations]]
path = ["assets/fonts/InterVariable.ttf"]
SPDX-FileCopyrightText = "Copyright 2016 The Inter Project Authors (https://github.com/rsms/inter)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = ["assets/fonts/IbarraRealNova.ttf", "assets/fonts/IbarraRealNova-Italic.ttf"]
SPDX-FileCopyrightText = "Copyright The Ibarra Real Nova Project Authors"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = ["assets/fonts/Trykker-Regular.ttf"]
SPDX-FileCopyrightText = "Copyright The Trykker Project Authors"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = ["assets/fonts/iAWriter*.ttf"]
SPDX-FileCopyrightText = "Copyright iA Inc."
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = ["assets/fonts/fa-brands-400.ttf", "assets/fonts/fa-solid-900.ttf"]
SPDX-FileCopyrightText = "Copyright Fonticons, Inc."
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = ["assets/fonts/material-symbols-outlined.ttf"]
SPDX-FileCopyrightText = "Copyright Google LLC"
SPDX-License-Identifier = "Apache-2.0"
