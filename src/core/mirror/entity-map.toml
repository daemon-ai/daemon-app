# entity-map.toml — the mirror data model (human-owned codegen INPUT).
#
# This is the single review surface for the client-side data model (spec 09 §3.2): one
# [entity.<Kind>] table per §3.1 census row. The second update-codec emitter
# (daemon-node/crates/contracts/daemon-api/mirror-codegen/entity_codegen.py) reads THIS file
# plus the pinned daemon-api.cddl and emits the vendored artifacts under generated/. Editing a
# field here is a one-line diff instead of N-surface row-shape drift (§3.6 / ADR-004).
#
# Provenance (§3.3): every generated field names exactly one of
#   wire = "<rule>[.<member>][#<derivation>]"   — a wire source path or named mapper derivation
#   client_local = true                         — sidecar-only, never in a mirror table
# The emitter FAILS if any field lacks provenance, if a wire path does not ground in the CDDL,
# or if a client_local field appears in a mirror table (fields.*). client_local fields live only
# under [entity.<Kind>.sidecar.*].
#
# Classes (§3.1): M = mirrored + persisted (m_* table); W = windowed (w_* table, retention
# policy §4.6); L = live (in memory, never persisted — no table). T entities are never stored and
# are deliberately absent from this map.
#
# key = the composite key components (§3.1 Key column), serialized canonically joined by \x1f.
# Every key component must be a declared field. For W entities, scope + window_key describe the
# per-scope window (§4.6); the window item is stored as a canonical-CBOR payload blob (§4.5).

# ============================================================================================
# M — mirrored + persisted
# ============================================================================================

