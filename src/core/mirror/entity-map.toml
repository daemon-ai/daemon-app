  type = "QString"
  [entity.FleetUnit.fields.end_reason]
  wire = "unit-node.state#end_reason"              # unit-state-finished.end_reason ("" unless Finished)
  type = "QString"
  [entity.FleetUnit.fields.work]
  wire = "unit-node.work"
  type = "QString"
  [entity.FleetUnit.fields.profile]
  wire = "unit-node.profile"
  type = "QString"
  [entity.FleetUnit.fields.session]
  wire = "unit-node.session"
  type = "QString"
  [entity.FleetUnit.fields.title]
  wire = "unit-node.title"
  type = "QString"
  [entity.FleetUnit.fields.role]
  wire = "unit-node.role"                          # session-role enum -> string (null => Primary)
  type = "QString"
  [entity.FleetUnit.fields.lifetime]
  wire = "unit-node.lifetime"                      # delegation-lifetime enum -> string
  type = "QString"
  [entity.FleetUnit.fields.child_count]
  wire = "unit-node.children#count"
  type = "int"
  # G2 (M5): the supervision-tree edge + engine identity, all off the wire unit-node (no CDDL
  # change). `child_ids` is the ordered children list (0x1f-joined) — the §3.5 unitsByParent
  # relation the fleet TREE render reconstructs (root = a node no child list names; parent + depth
  # are derived pre-order at projection time). engine/engine_agent carry the v29 engine-selector so
  # the tree renders the Native/Foreign chip without a per-node profile join.
  [entity.FleetUnit.fields.engine]
  wire = "unit-node.engine"                        # engine-selector -> "Core" | "Foreign" | ""
  type = "QString"
  [entity.FleetUnit.fields.engine_agent]
  wire = "unit-node.engine#agent"                  # engine-selector Foreign agent name
  type = "QString"
  [entity.FleetUnit.fields.child_ids]
  wire = "unit-node.children"                       # ordered child unit-ids, 0x1f-joined (the edge)
  type = "QString"

