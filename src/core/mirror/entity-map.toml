[entity.TranscriptBlock]
class = "W"
scope = ["session"]
window_key = "seq"
policy = "transcript"
table = "w_transcript_blocks"
invalidators = ["SessionAdvanced"]
wire_read = ["SessionHistory"]
# The wire-decode/offline-reload feed maps a journal-record (its payload carries the transcript
# block); pin the mapper source explicitly so it does not drift with the modal field-rule inference
# (G2 added tool-call/tool-result fields, which would otherwise re-infer the source DTO).
source = "journal-record"
# NOTE (§3.1): TranscriptBlock joins the mirror in M4/M5; until then the legacy table is frozen.
# transcript-block is a CDDL union (Message/ToolCall/ToolResult/Request/Content); modeled here with
# a union discriminator plus the fields common across variants, all grounded on the variant rules.

  [entity.TranscriptBlock.fields.session]
  wire = "request-session-history.SessionHistory#session"  # scope: the SessionHistory request session
  type = "QString"
  [entity.TranscriptBlock.fields.seq]
  wire = "journal-record.seq"                      # window key = journal seq
  type = "quint64"
  [entity.TranscriptBlock.fields.kind]
  wire = "transcript-block#tag"                    # union discriminator -> string
  type = "QString"
  [entity.TranscriptBlock.fields.role]
  wire = "transcript-block-message.role"           # transcript-role enum -> string (Message)
  type = "QString"
  [entity.TranscriptBlock.fields.text]
  wire = "transcript-block-message.text"           # (Message)
  type = "QString"
  [entity.TranscriptBlock.fields.call_id]
  wire = "transcript-block-tool-call.call_id"      # (ToolCall)
  type = "QString"
  [entity.TranscriptBlock.fields.name]
  wire = "transcript-block-tool-call.name"         # (ToolCall)
  type = "QString"
  [entity.TranscriptBlock.fields.summary]
  wire = "transcript-block-tool-result.summary"    # (ToolResult)
  type = "QString"
  [entity.TranscriptBlock.fields.ok]
  wire = "transcript-block-tool-result.ok"         # (ToolResult)
  type = "bool"
  [entity.TranscriptBlock.fields.origin_op]
  wire = "journal-record#origin_op"                # rung-3 provenance (§10.3; null until api/39)
  type = "QString"
  # G2 (M5): the fidelity fields the byte-stable msg-fence content() projection needs to reproduce
  # tool fences — all already on the wire (no CDDL change). `args_summary` is the ToolCall args key
  # the legacy fence always emits; `detail_kind`/`detail_body` are the ToolResult structured detail
  # (tool-detail = {kind, body}) folded into the fence (body decoded from the byte-array as UTF-8).
  [entity.TranscriptBlock.fields.args_summary]
  wire = "transcript-block-tool-call.args_summary" # (ToolCall)
  type = "QString"
  [entity.TranscriptBlock.fields.detail_kind]
  wire = "transcript-block-tool-result.detail#kind" # (ToolResult tool-detail.kind)
  type = "QString"
  [entity.TranscriptBlock.fields.detail_body]
  wire = "transcript-block-tool-result.detail#body" # (ToolResult tool-detail.body; byte-array->utf8)
  type = "QString"

